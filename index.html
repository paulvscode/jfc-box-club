        ctx.fillStyle = `rgb(${Math.min(255, Math.round(b.r*m))},${Math.min(255, Math.round(b.g*m))},${Math.min(255, Math.round(b.b*m))})`;
        roundRect(ctx, st.x, row.y - row.stoneH/2, row.stoneW - 2, row.stoneH - 2, 2);
        ctx.fill();
      }
    }
  }

  // ---------- Draw background (static arena) ----------
  function drawArena(){
    ctx.fillStyle = "#241820";
    ctx.fillRect(0, 0, W, FLOOR.yMin);

    // back wall brick pattern
    ctx.fillStyle = "#3a2530";
    ctx.fillRect(0, 0, W, FLOOR.yMin + 20);
    ctx.strokeStyle = "rgba(0,0,0,0.25)";
    ctx.lineWidth = 1;
    const brickH = 18, brickW = 46;
    for (let row = 0, y = 10; y < FLOOR.yMin + 20; row++, y += brickH){
      const offset = (row % 2) * (brickW/2);
      for (let x = -brickW + offset; x < W; x += brickW){
        ctx.strokeRect(x, y, brickW, brickH);
      }
    }

    // back windows for depth interest
    ctx.fillStyle = "#171018";
    for (let i=0;i<5;i++){
      ctx.fillRect(70 + i*180, 40, 60, 80);
    }
    ctx.strokeStyle = "#8a6a2a";
    for (let i=0;i<5;i++){
      ctx.strokeRect(70 + i*180, 40, 60, 80);
    }

    // sidewalk crowd, standing behind the barrier that lines the playable floor
    drawCrowdBackground();
    ctx.fillStyle = "#0f0a10";
    ctx.fillRect(0, FLOOR.yMin - 8, W, 8);
    ctx.strokeStyle = "#171018";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(0, FLOOR.yMin - 8);
    ctx.lineTo(W, FLOOR.yMin - 8);
    ctx.stroke();

    // floor -- dark grout base showing through the gaps between cobblestones
    ctx.fillStyle = "#332a26";
    ctx.fillRect(0, FLOOR.yMin, W, H - FLOOR.yMin);
    drawStreetPattern();

    // painted road centerline, converging toward the vanishing point like a real street lane marking
    const vanishX = W/2;
    ctx.strokeStyle = "rgba(232,201,61,0.55)";
    ctx.lineWidth = 3;
    ctx.setLineDash([14, 12]);
    ctx.beginPath();
    ctx.moveTo(vanishX, FLOOR.yMax);
    ctx.lineTo(vanishX, FLOOR.yMin);
    ctx.stroke();
    ctx.setLineDash([]);

    // floor perspective lines converging toward back
    ctx.strokeStyle = "rgba(0,0,0,0.18)";
    ctx.lineWidth = 2;
    for (let i=-4;i<=4;i++){
      if (i === 0) continue; // skip -- the painted centerline already covers this one
      ctx.beginPath();
      ctx.moveTo(vanishX + i*90, FLOOR.yMax);
      ctx.lineTo(vanishX + i*18, FLOOR.yMin);
      ctx.stroke();
    }
    for (let yy = FLOOR.yMin; yy <= FLOOR.yMax; yy += 22){
      ctx.beginPath();
      ctx.moveTo(0, yy);
      ctx.lineTo(W, yy);
      ctx.strokeStyle = "rgba(0,0,0,0.08)";
      ctx.stroke();
    }

    // floor boundary trim
    ctx.strokeStyle = "#8a6a2a";
    ctx.lineWidth = 3;
    ctx.strokeRect(FLOOR.xMin, FLOOR.yMin, FLOOR.xMax - FLOOR.xMin, FLOOR.yMax - FLOOR.yMin);
  }

  // ---------- UI ----------
  function drawHealthBar(x, y, w, h, hp, maxHp, label, accent){
    const pct = Math.max(0, hp / maxHp);
    ctx.save();
    ctx.fillStyle = "rgba(20,14,18,0.85)";
    roundRect(ctx, x-3, y-3, w+6, h+6, 4);
    ctx.fill();
    ctx.strokeStyle = accent;
    ctx.lineWidth = 2;
    roundRect(ctx, x-3, y-3, w+6, h+6, 4);
    ctx.stroke();

    ctx.fillStyle = "#2a1e24";
    ctx.fillRect(x, y, w, h);

    const barColor = pct > 0.5 ? "#4fd15a" : pct > 0.25 ? "#e8c93d" : "#e5384f";
    ctx.fillStyle = barColor;
    ctx.fillRect(x, y, w * pct, h);

    ctx.strokeStyle = "rgba(0,0,0,0.4)";
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);

    if (label){
      ctx.font = "bold 12px 'Arial Narrow', Arial, sans-serif";
      ctx.fillStyle = accent;
      ctx.textBaseline = "bottom";
      ctx.fillText(label, x, y - 4);
    }
    ctx.restore();
  }

  function drawEnemyHUD(enemyList){
    const alive = enemyList.filter(e => e.alive);
    const boss = alive.find(e => e instanceof Boss);
    const grunts = alive.filter(e => !(e instanceof Boss));

    if (boss){
      const bw = 320, bh = 18;
      drawHealthBar(W/2 - bw/2, 34, bw, bh, boss.hp, boss.maxHp, "BOSS", "#c9a13d");
    }

    const w = 150, h = 10, gap = 8;
    let y = 30;
    for (let i = 0; i < grunts.length; i++){
      drawHealthBar(W - 30 - w, y, w, h, grunts[i].hp, grunts[i].maxHp, i === 0 ? "ENEMIES" : null, "#e5384f");
      y += h + gap;
    }
  }

  function drawSkillCooldownBars(x, y, player){
    const skills = [
      { key: "H", name: "FIREBALL", cd: player.fireballCooldown, max: SKILLS.fireball.cooldown, color: "#f2941f", locked: !player.fireballUnlocked },
      { key: "L", name: "GRENADE",  cd: player.grenadeCooldown,  max: SKILLS.grenade.cooldown,  color: "#8fae3d", locked: false },
      { key: "U", name: "PAPERS",   cd: player.papersCooldown,   max: SKILLS.papers.cooldown,   color: "#c9c2b3", locked: !player.papersUnlocked }
    ].filter(s => !s.locked); // hide rows for skills not yet unlocked, rather than showing a locked placeholder
    const w = 120, h = 12, gap = 6;
    let py = y;
    ctx.save();
    ctx.font = "bold 10px 'Arial Narrow', Arial, sans-serif";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    for (const s of skills){
      const ready = s.cd <= 0;
      const pct = ready ? 1 : Math.max(0, 1 - s.cd / s.max);

      ctx.fillStyle = "rgba(20,14,18,0.85)";
      roundRect(ctx, x-2, py-2, w+4, h+4, 3);
      ctx.fill();
      ctx.strokeStyle = ready ? s.color : "#4a3540";
      ctx.lineWidth = 1.5;
      roundRect(ctx, x-2, py-2, w+4, h+4, 3);
      ctx.stroke();

      ctx.fillStyle = "#2a1e24";
      ctx.fillRect(x, py, w, h);
      ctx.fillStyle = s.color;
      ctx.fillRect(x, py, w * pct, h);

      ctx.fillStyle = ready ? "#1a1410" : "rgba(255,255,255,0.75)";
      ctx.fillText(`${s.key} ${s.name}`, x + 5, py + h/2 + 1);

      py += h + gap;
    }
    ctx.restore();
    return py; // bottom edge, so callers can position whatever comes next without a gap
  }

  function drawMenu(){
    ctx.save();

    // banner fills the entire canvas (cropped to cover, not stretched/distorted)
    if (isReady(menuBanner)){
      const cover = Math.max(W / menuBanner.naturalWidth, H / menuBanner.naturalHeight);
      const dw = menuBanner.naturalWidth * cover, dh = menuBanner.naturalHeight * cover;
      ctx.drawImage(menuBanner, (W - dw) / 2, (H - dh) / 2, dw, dh);
    } else {
      ctx.fillStyle = "#211820";
      ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = "#4a3540";
      ctx.setLineDash([8, 6]);
      ctx.lineWidth = 2;
      ctx.strokeRect(20, 20, W - 40, H - 40);
      ctx.setLineDash([]);
      ctx.textAlign = "center";
      ctx.fillStyle = "#5f5250";
      ctx.font = "13px 'Arial Narrow', Arial, sans-serif";
      ctx.fillText("DROP YOUR ART HERE", W/2, H/2 - 6);
      ctx.font = "11px 'Arial Narrow', Arial, sans-serif";
      ctx.fillText(MENU_BANNER_PATH, W/2, H/2 + 12);
    }

    // dark scrim so the title/prompt stay legible over any art
    ctx.fillStyle = "rgba(10,6,9,0.45)";
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = "center";
    ctx.fillStyle = "#e8b23d";
    ctx.font = "bold 46px 'Arial Black', Impact, sans-serif";
    ctx.fillText(gameTitleText, W/2, 100);

    ctx.font = "13px 'Arial Narrow', Arial, sans-serif";
    ctx.fillStyle = "#b9ab9d";
    ctx.fillText("BRAWLER PROTOTYPE", W/2, 124);

    const blink = Math.floor(performance.now() / 500) % 2 === 0;
    if (blink){
      ctx.font = "bold 17px 'Arial Narrow', Arial, sans-serif";
      ctx.fillStyle = "#efe6da";
      ctx.fillText("PRESS ENTER TO START", W/2, H - 60);
    }
    ctx.restore();
  }

  function drawSpecialBar(){
    const w = 260, h = 16;
    const x = W/2 - w/2, y = H - 32;
    const pct = p1.specialCharge / SPECIAL_CHARGE_MAX;
    const full = p1.specialCharge >= SPECIAL_CHARGE_MAX;

    ctx.save();
    ctx.fillStyle = "rgba(20,14,18,0.85)";
    roundRect(ctx, x-3, y-3, w+6, h+6, 4);
    ctx.fill();
    ctx.strokeStyle = full ? "#ffe37a" : "#8a6a2a";
    ctx.lineWidth = 2;
    roundRect(ctx, x-3, y-3, w+6, h+6, 4);
    ctx.stroke();

    ctx.fillStyle = "#2a1e24";
    ctx.fillRect(x, y, w, h);

    // when full, the fill blinks on/off; otherwise it just tracks progress
    const blinkOn = !full || Math.floor(performance.now() / 220) % 2 === 0;
    if (blinkOn){
      const grad = ctx.createLinearGradient(x, 0, x+w, 0);
      grad.addColorStop(0, "#f2941f");
      grad.addColorStop(1, "#ffe37a");
      ctx.fillStyle = grad;
      ctx.fillRect(x, y, w * pct, h);
    }

    ctx.strokeStyle = "rgba(0,0,0,0.4)";
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);

    ctx.textAlign = "center";
    ctx.font = "bold 11px 'Arial Narrow', Arial, sans-serif";
    ctx.fillStyle = full ? "#ffe37a" : "#b9ab9d";
    ctx.fillText(full ? "SPECIAL READY — PRESS I" : "SPECIAL", x + w/2, y - 6);
    ctx.restore();
  }

  function drawXPBar(x, y, player){
    const w = 200, h = 8;
    const pct = Math.min(1, player.xp / player.xpToNext);
    ctx.save();
    ctx.fillStyle = "rgba(20,14,18,0.85)";
    roundRect(ctx, x-2, y-2, w+4, h+4, 3);
    ctx.fill();
    ctx.strokeStyle = "#4a8f5c";
    ctx.lineWidth = 1.5;
    roundRect(ctx, x-2, y-2, w+4, h+4, 3);
    ctx.stroke();

    ctx.fillStyle = "#2a1e24";
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = "#6fd17a";
    ctx.fillRect(x, y, w * pct, h);
    ctx.strokeStyle = "rgba(0,0,0,0.4)";
    ctx.lineWidth = 1;
    ctx.strokeRect(x, y, w, h);

    ctx.font = "bold 10px 'Arial Narrow', Arial, sans-serif";
    ctx.fillStyle = "#9fd9a8";
    ctx.textAlign = "left";
    ctx.textBaseline = "middle";
    ctx.fillText(`XP ${Math.floor(player.xp)}/${player.xpToNext}`, x + 4, y + h/2 + 1);
    ctx.restore();
    return y + h + 10; // bottom edge + gap, for chaining
  }

  function drawPunchStreak(x, y, player){
    if (player.punchLevel < 2 || player.punchStreak <= 0) return; // only relevant once punch_lvl_2 is learned
    const ready = player.punchStreak >= 3;
    ctx.save();
    ctx.font = "bold 12px 'Arial Narrow', Arial, sans-serif";
    ctx.textAlign = "left";
    ctx.fillStyle = ready ? "#ffe37a" : "#efe6da";
    ctx.fillText(ready ? `PUNCH (${player.punchStreak} — VOLLEY READY)` : `PUNCH (${player.punchStreak})`, x, y);
    ctx.restore();
  }

  function drawHUD(){
    drawHealthBar(30, 30, 200, 16, p1.hp, p1.maxHp, "PLAYER", "#3b6bff");
    let hudY = drawSkillCooldownBars(30, 52, p1);
    hudY = drawXPBar(30, hudY, p1);
    drawPunchStreak(30, hudY, p1);
    drawEnemyHUD(enemies);
    drawSpecialBar();

    if (DEV_MODE){
      ctx.save();
      ctx.font = "bold 11px 'Arial Narrow', Arial, sans-serif";
      ctx.textAlign = "right";
      ctx.fillStyle = "#e5384f";
      ctx.fillText("DEV MODE — 0: grant level", W - 12, H - 12);
      ctx.restore();
    }

    const aliveEnemies = enemies.filter(e => e.alive).length;
    ctx.save();
    ctx.font = "bold 13px 'Arial Narrow', Arial, sans-serif";
    ctx.fillStyle = "#e8b23d";
    ctx.textAlign = "center";
    ctx.fillText(`${LEVELS[levelIndex].name} · ENEMIES REMAINING: ${aliveEnemies}`, W/2, 24);
    ctx.restore();

    if (matchState === "wave-clear"){
      ctx.save();
      ctx.fillStyle = "rgba(10,6,9,0.72)";
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = "center";
      ctx.font = "bold 38px 'Arial Black', Impact, sans-serif";
      ctx.fillStyle = "#e8b23d";
      ctx.fillText(`${LEVELS[levelIndex].name} CLEARED`, W/2, H/2 - 10);
      ctx.font = "14px 'Arial Narrow', Arial, sans-serif";
      ctx.fillStyle = "#efe6da";
      ctx.fillText(`Press ENTER for ${LEVELS[levelIndex + 1].name}`, W/2, H/2 + 26);
      ctx.restore();
    }

    if (matchState === "levelup" && pendingSkillChoices){
      ctx.save();
      ctx.fillStyle = "rgba(10,6,9,0.85)";
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = "center";
      ctx.font = "bold 32px 'Arial Black', Impact, sans-serif";
      ctx.fillStyle = "#e8b23d";
      ctx.fillText("LEVEL UP!", W/2, 120);
      ctx.font = "13px 'Arial Narrow', Arial, sans-serif";
      ctx.fillStyle = "#b9ab9d";
      ctx.fillText("Choose a skill to learn", W/2, 144);

      const cardW = 300, cardH = 150, gap = 30;
      const totalW = pendingSkillChoices.length * cardW + (pendingSkillChoices.length - 1) * gap;
      let cx = W/2 - totalW/2;
      const cardY = 175;
      for (let i = 0; i < pendingSkillChoices.length; i++){
        const choice = pendingSkillChoices[i];
        const accent = choice.path === "punch" ? "#3b6bff" : "#8fae3d";

        ctx.fillStyle = "rgba(33,24,32,0.92)";
        roundRect(ctx, cx, cardY, cardW, cardH, 6);
        ctx.fill();
        ctx.strokeStyle = accent;
        ctx.lineWidth = 2;
        roundRect(ctx, cx, cardY, cardW, cardH, 6);
        ctx.stroke();

        ctx.font = "bold 20px 'Arial Black', Impact, sans-serif";
        ctx.fillStyle = accent;
        ctx.fillText(`[${i + 1}]`, cx + cardW/2, cardY + 34);

        ctx.font = "bold 15px 'Arial Narrow', Arial, sans-serif";
        ctx.fillStyle = "#efe6da";
        ctx.fillText(choice.name, cx + cardW/2, cardY + 62);

        ctx.font = "12px 'Arial Narrow', Arial, sans-serif";
        ctx.fillStyle = "#b9ab9d";
        wrapText(ctx, choice.desc, cx + cardW/2, cardY + 90, cardW - 30, 16);

        cx += cardW + gap;
      }

      ctx.font = "13px 'Arial Narrow', Arial, sans-serif";
      ctx.fillStyle = "#efe6da";
      ctx.fillText("Press 1 or 2 to choose", W/2, cardY + cardH + 40);
      ctx.restore();
    }

    if (matchState === "perkTree"){
      ctx.save();
      ctx.fillStyle = "rgba(10,6,9,0.85)";
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = "center";
      ctx.font = "bold 30px 'Arial Black', Impact, sans-serif";
      ctx.fillStyle = "#e8b23d";
      ctx.fillText("PERK TREE UNLOCKED", W/2, 108);
      ctx.font = "13px 'Arial Narrow', Arial, sans-serif";
      ctx.fillStyle = "#b9ab9d";
      ctx.fillText("Press 1 and 2 to unlock new skills, then ENTER to continue", W/2, 132);

      const perks = [
        { key: "1", name: "Fireball", desc: "A ranged fire projectile, thrown in a straight line.", unlocked: p1.fireballUnlocked, accent: "#f2941f" },
        { key: "2", name: "Papers", desc: "A thrown stack of papers with a short arc.", unlocked: p1.papersUnlocked, accent: "#c9c2b3" }
      ];
      const cardW = 300, cardH = 150, gap = 30;
      const totalW = perks.length * cardW + (perks.length - 1) * gap;
      let cx = W/2 - totalW/2;
      const cardY = 165;
      for (const perk of perks){
        ctx.fillStyle = "rgba(33,24,32,0.92)";
        roundRect(ctx, cx, cardY, cardW, cardH, 6);
        ctx.fill();
        ctx.strokeStyle = perk.unlocked ? perk.accent : "#4a3540";
        ctx.lineWidth = 2;
        roundRect(ctx, cx, cardY, cardW, cardH, 6);
        ctx.stroke();

        ctx.font = "bold 20px 'Arial Black', Impact, sans-serif";
        ctx.fillStyle = perk.unlocked ? perk.accent : "#efe6da";
        ctx.fillText(`[${perk.key}]`, cx + cardW/2, cardY + 34);

        ctx.font = "bold 15px 'Arial Narrow', Arial, sans-serif";
        ctx.fillStyle = "#efe6da";
        ctx.fillText(perk.name, cx + cardW/2, cardY + 62);

        ctx.font = "12px 'Arial Narrow', Arial, sans-serif";
        ctx.fillStyle = "#b9ab9d";
        wrapText(ctx, perk.desc, cx + cardW/2, cardY + 90, cardW - 30, 16);

        ctx.font = "bold 12px 'Arial Narrow', Arial, sans-serif";
        ctx.fillStyle = perk.unlocked ? "#6fd17a" : "#e5384f";
        ctx.fillText(perk.unlocked ? "UNLOCKED" : "LOCKED", cx + cardW/2, cardY + cardH - 14);

        cx += cardW + gap;
      }

      ctx.font = "13px 'Arial Narrow', Arial, sans-serif";
      ctx.fillStyle = "#efe6da";
      ctx.fillText("Press ENTER to continue", W/2, cardY + cardH + 40);
      ctx.restore();
    }

    if (matchState === "win" || matchState === "lose"){
      ctx.save();
      ctx.fillStyle = "rgba(10,6,9,0.72)";
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign = "center";
      ctx.font = "bold 44px 'Arial Black', Impact, sans-serif";
      ctx.fillStyle = matchState === "win" ? "#e8b23d" : "#e5384f";
      ctx.fillText(matchState === "win" ? "MANIF' DE RUE CLEARED" : "GAME OVER", W/2, H/2 - 10);
      ctx.font = "14px 'Arial Narrow', Arial, sans-serif";
      ctx.fillStyle = "#efe6da";
      ctx.fillText("Press ENTER to restart", W/2, H/2 + 26);
      ctx.restore();
    }
  }

  // ---------- Main loop ----------
  let lastTime = performance.now();
  function frame(now){
    const dt = Math.min(0.033, (now - lastTime) / 1000);
    lastTime = now;

    if (matchState === "menu"){
      if (keys.has("Enter")){
        matchState = "playing";
        playMusic("level1");
      }
    } else if (matchState === "playing"){
      p1.handleInput(dt);
      p1.updateCommon(dt);
      updateAttackPhase(p1, dt);
      resolveAttack(p1, enemies);
      updateFireballs(dt);
      updateGrenades(dt);
      updatePapers(dt);
      updateSpecialBursts(dt);
      updateOnHitEffects(dt);
      updateFloatingTexts(dt);
      updatePavers(dt);
      updateHealthPacks(dt);

      for (const e of enemies){
        e.updateAI(dt, players);
        e.updateCommon(dt);
        updateAttackPhase(e, dt);
        resolveAttack(e, players);
      }

      if (enemies.every(e => !e.alive)){
        matchState = levelIndex < LEVELS.length - 1 ? "wave-clear" : "perkTree";
      } else if (!p1.alive){
        matchState = "lose";
      }
    } else if (matchState === "wave-clear"){
      if (keys.has("Enter")){
        levelIndex++;
        enemies = spawnWave(levelIndex);
        fireballs.length = 0; grenades.length = 0; explosions.length = 0; papers.length = 0; specialBursts.length = 0; onHitEffects.length = 0; pavers.length = 0; floatingTexts.length = 0; healthPacks.length = 0;
        // clear out whatever mid-animation state the player was frozen in while the wave-clear screen was up
        p1.state = "idle";
        p1.poseHold = false;
        p1.specialPending = false;
        p1.stateTimer = 0;
        matchState = "playing";
      }
    } else if (matchState === "levelup"){
      if (pendingSkillChoices && pendingSkillChoices[0] && keys.has("Digit1")){
        applySkillChoice(pendingSkillChoices[0]);
      } else if (pendingSkillChoices && pendingSkillChoices[1] && keys.has("Digit2")){
        applySkillChoice(pendingSkillChoices[1]);
      }
    } else if (matchState === "perkTree"){
      if (keys.has("Digit1")) p1.fireballUnlocked = true;
      if (keys.has("Digit2")) p1.papersUnlocked = true;
      if (keys.has("Enter")) matchState = "win";
    } else {
      if (keys.has("Enter")) resetGame();
    }

    // draw
    drawArena();
    if (matchState === "menu"){
      drawMenu();
    } else {
      const drawList = [p1, ...enemies].sort((a,b) => a.y - b.y);
      for (const ent of drawList) ent.draw(ctx);
      for (const f of fireballs) drawFireball(f);
      for (const g of grenades) drawGrenade(g);
      for (const p of papers) drawPapers(p);
      for (const ex of explosions) drawExplosion(ex);
      for (const b of specialBursts) drawSpecialBurst(b);
      for (const pv of pavers) drawPaver(pv);
      for (const pack of healthPacks) drawHealthPack(pack);
      for (const e of onHitEffects) drawOnHitEffect(e);
      for (const f of floatingTexts) drawFloatingText(f);
      drawHUD();
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
